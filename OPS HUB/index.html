]<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire Ops Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            background-image: url('flag.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ff4500;
        }

        h1, h3 { color: #ff4500; text-shadow: 2px 2px 4px #000; }
        h4 { color: #ccc; text-transform: uppercase; margin-top: 25px; border-bottom: 1px solid #444; padding-bottom: 5px; }

        /* Button Grid Styling */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        
        .app-btn {
            background: #b22222; /* Firebrick red */
            color: white;
            padding: 18px 10px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9em;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }

        .full-btn { grid-column: span 2; background: #d32f2f; padding: 25px; font-size: 1.1em; }

        /* Labeled Boxes Styling */
        .hidden { display: none; }
        
        .assessment-group { margin-bottom: 15px; text-align: left; }
        .assessment-group label {
            display: block;
            font-weight: bold;
            color: #ffaa00;
            margin-bottom: 5px;
            font-size: 0.85em;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.9);
            color: #222;
            font-size: 16px;
            box-sizing: border-box;
        }

        .nav-btn {
            background: #444;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }

        .clear-btn { background: #8b0000; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="dashboard">
        <h1>OPS HUB</h1>

        <h4>Active Response</h4>
        <div class="btn-grid">
            <a href="shortcuts://run-shortcut?name=OpenIaR" class="app-btn">🚨 IaR App</a>
            <a href="https://www.google.com" class="app-btn">🚑 Emerg Network</a>
        </div>

        <h4>Medical Tools</h4>
        <div class="btn-grid">
            <a href="#" class="app-btn full-btn" onclick="toggleView('scratchpad')">📝 Assessment Scratchpad</a>
            <a href="https://www.mass.gov/lists/ems-statewide-treatment-protocols" class="app-btn">⚕️ MA Protocols</a>
            <a href="https://www.cdc.gov/niosh/npg/default.html" class="app-btn">🧪 NIOSH Guide</a>
        </div>

        <h4>Field Resources</h4>
        <div class="btn-grid">
            <a href="shortcuts://run-shortcut?name=ERG" class="app-btn">☢️ ERG App</a>
            <a href="shortcuts://run-shortcut?name=Weather" class="app-btn">🌩️ Weather App</a>
        </div>
    </div>

    <div id="scratchpad" class="hidden">
        <h3>Patient Assessment</h3>
        
        <div class="assessment-group">
            <label>Mental Status (GCS/AVPU)</label>
            <textarea id="mental" rows="2" placeholder="e.g. A&O x4..."></textarea>
        </div>

        <div class="assessment-group">
            <label>Vitals (BP, HR, RR, SpO2)</label>
            <textarea id="vitals" rows="2" placeholder="e.g. 120/80..."></textarea>
        </div>

        <div class="assessment-group">
            <label>Physical Exam / Injuries</label>
            <textarea id="physical" rows="4" placeholder="Head-to-toe findings..."></textarea>
        </div>

        <div class="assessment-group">
            <label>Meds / Allergies</label>
            <textarea id="meds" rows="2" placeholder="Current medications..."></textarea>
        </div>

        <button class="nav-btn" onclick="toggleView('dashboard')">⬅ Back to Dashboard</button>
        <button class="nav-btn clear-btn" onclick="clearAll()">🗑 Clear All Notes</button>
    </div>

</div>

<script>
    // Switches between Dashboard and Scratchpad
    function toggleView(viewId) {
        document.getElementById('dashboard').classList.toggle('hidden', viewId === 'scratchpad');
        document.getElementById('scratchpad').classList.toggle('hidden', viewId === 'dashboard');
        window.scrollTo(0,0);
    }

    // Auto-Save Logic
    const fields = ['mental', 'vitals', 'physical', 'meds'];
    fields.forEach(id => {
        const box = document.getElementById(id);
        box.value = localStorage.getItem(id) || '';
        box.addEventListener('input', () => {
            localStorage.setItem(id, box.value);
        });
    });

    function clearAll() {
        if (confirm("Delete all patient notes?")) {
            fields.forEach(id => {
                document.getElementById(id).value = '';
                localStorage.removeItem(id);
            });
        }
    }
</script>

</body>
</html>
