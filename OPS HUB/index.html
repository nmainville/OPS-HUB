<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire Ops Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a; /* Dark background */
            background-image: url('flag.jpg'); /* Your background image */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(0, 0, 0, 0.7); /* Dark overlay to make text readable */
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ff4500;
        }

        h1 { margin-bottom: 20px; color: #ff4500; text-shadow: 2px 2px 4px #000; }

        /* App Buttons */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .app-btn {
            background: #ff4500;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Assessment Pad Styling */
        #assessment-pad {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #555;
        }

        .assessment-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .assessment-group label {
            display: block;
            font-weight: bold;
            color: #ffaa00;
            margin-bottom: 5px;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 16px; /* Prevents iPhone zoom on focus */
            box-sizing: border-box;
            font-family: inherit;
        }

        .clear-btn {
            background: #d9534f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fire Ops Hub</h1>

    <div class="btn-grid">
        <a href="shortcuts://run-shortcut?name=OpenIaR" class="app-btn">IaR App</a>
        <a href="shortcuts://run-shortcut?name=Weather" class="app-btn">Weather</a>
        <a href="shortcuts://run-shortcut?name=ERG" class="app-btn">ERG Guide</a>
        <a href="https://www.google.com" class="app-btn">Search</a>
    </div>

    <div id="assessment-pad">
        <h3 style="margin-top: 0;">Patient Assessment</h3>
        
        <div class="assessment-group">
            <label>Mental Status (GCS/AVPU)</label>
            <textarea id="mental" rows="2" placeholder="e.g. A&O x4..."></textarea>
        </div>

        <div class="assessment-group">
            <label>Vitals (BP, HR, RR, SpO2)</label>
            <textarea id="vitals" rows="2" placeholder="e.g. 120/80, 80..."></textarea>
        </div>

        <div class="assessment-group">
            <label>Physical Exam / Injuries</label>
            <textarea id="physical" rows="3" placeholder="Notes on injuries..."></textarea>
        </div>

        <div class="assessment-group">
            <label>Meds / Allergies</label>
            <textarea id="meds" rows="2" placeholder="Known allergies..."></textarea>
        </div>

        <button class="clear-btn" onclick="clearAll()">Clear All Notes</button>
    </div>
</div>

<script>
    // This part makes sure your notes don't disappear if you close the app
    const fields = ['mental', 'vitals', 'physical', 'meds'];

    // Load saved data when the app opens
    fields.forEach(id => {
        const saved = localStorage.getItem(id);
        if (saved) document.getElementById(id).value = saved;
        
        // Save data automatically as you type
        document.getElementById(id).addEventListener('input', (e) => {
            localStorage.setItem(id, e.target.value);
        });
    });

    function clearAll() {
        if (confirm("Clear all assessment notes?")) {
            fields.forEach(id => {
                document.getElementById(id).value = '';
                localStorage.removeItem(id);
            });
        }
    }
</script>

</body>
</html>
